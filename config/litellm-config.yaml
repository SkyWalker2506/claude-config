# LiteLLM Proxy Config — Free Model Routing
# Claude Code sends Anthropic model IDs → proxy routes to free models via OpenRouter
#
# Usage: litellm --config ~/Projects/claude-config/config/litellm-config.yaml --port 4123
# Then:  ANTHROPIC_BASE_URL=http://localhost:4123 claude --model claude-sonnet-4-6

model_list:
  # All Anthropic model IDs → free model
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: openrouter/qwen/qwen3.6-plus:free
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  - model_name: claude-opus-4-6
    litellm_params:
      model: openrouter/qwen/qwen3.6-plus:free
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  - model_name: claude-haiku-4-5-20251001
    litellm_params:
      model: openrouter/qwen/qwen3.6-plus:free
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  # Aliases
  - model_name: sonnet
    litellm_params:
      model: openrouter/qwen/qwen3.6-plus:free
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  - model_name: opus
    litellm_params:
      model: openrouter/qwen/qwen3.6-plus:free
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  - model_name: haiku
    litellm_params:
      model: openrouter/qwen/qwen3.6-plus:free
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

litellm_settings:
  drop_params: true
  set_verbose: false
