name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          DIFF=$(git diff origin/${{ github.event.pull_request.base.ref }}...HEAD --stat | head -50)
          DIFF_DETAIL=$(git diff origin/${{ github.event.pull_request.base.ref }}...HEAD -- '*.md' '*.sh' '*.yml' | head -300)
          COMBINED="${DIFF}
          ---
          ${DIFF_DETAIL}"
          echo "diff<<DIFFEOF" >> $GITHUB_OUTPUT
          echo "$COMBINED" >> $GITHUB_OUTPUT
          echo "DIFFEOF" >> $GITHUB_OUTPUT

      - name: AI Review via OpenRouter (Free)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Build prompt
          cat > /tmp/review_prompt.txt << 'PROMPT_EOF'
          Review this PR for a multi-agent OS config repo. Focus on:
          1. JSON file validity (config/*.json)
          2. Agent .md files have correct frontmatter (id, name, model, capabilities)
          3. install.sh backward compatibility
          4. Security (no secrets, no dangerous commands)
          5. Code quality

          Group findings as: RED Must Fix | YELLOW Suggestion | GREEN Good.
          PROMPT_EOF

          echo "" >> /tmp/review_prompt.txt
          echo "PR diff:" >> /tmp/review_prompt.txt
          echo '${{ steps.diff.outputs.diff }}' >> /tmp/review_prompt.txt

          PROMPT=$(cat /tmp/review_prompt.txt)

          # Call OpenRouter
          RESPONSE=$(curl -s -X POST https://openrouter.ai/api/v1/chat/completions \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg p "$PROMPT" \
              '{"model":"qwen/qwen3.6-free","messages":[{"role":"user","content":$p}],"max_tokens":2000}')")

          REVIEW=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')

          if [ -z "$REVIEW" ]; then
            ERROR=$(echo "$RESPONSE" | jq -r '.error.message // "Unknown error"')
            REVIEW="Review failed: $ERROR"
          fi

          # Post as PR comment
          BODY="## AI Code Review (Qwen 3.6 Free via OpenRouter)

          ${REVIEW}

          ---
          *Cost: \$0.00 — free model via OpenRouter*"

          gh pr comment ${{ github.event.pull_request.number }} --body "$BODY"
