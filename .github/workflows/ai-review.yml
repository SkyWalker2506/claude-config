name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: AI Review via Groq Free
        run: |
          set +e

          # Get diff
          git fetch origin "${{ github.event.pull_request.base.ref }}" --quiet
          STAT=$(git diff "origin/${{ github.event.pull_request.base.ref }}"...HEAD --stat | head -40)
          DETAIL=$(git diff "origin/${{ github.event.pull_request.base.ref }}"...HEAD -- '*.md' '*.sh' '*.yml' | head -200)

          # Build JSON payload
          PROMPT="Review this PR for a multi-agent OS config repo. PR stat: ${STAT} --- Detail: ${DETAIL} --- Focus: 1) JSON validity 2) Agent frontmatter 3) install.sh backward compat 4) Security 5) Quality. Group: RED Must Fix, YELLOW Suggestion, GREEN Good."

          # Escape for JSON
          PAYLOAD=$(python3 -c "
          import json, sys
          prompt = sys.stdin.read()
          print(json.dumps({
            'model': 'llama-3.3-70b-versatile',
            'messages': [{'role': 'user', 'content': prompt}],
            'max_tokens': 2000
          }))
          " <<< "$PROMPT")

          # Call API
          RESPONSE=$(curl -s -X POST https://api.groq.com/openai/v1/chat/completions \
            -H "Authorization: Bearer ${GROQ_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          REVIEW=$(echo "$RESPONSE" | python3 -c "
          import json, sys
          try:
            data = json.load(sys.stdin)
            content = data.get('choices', [{}])[0].get('message', {}).get('content', '')
            if content:
              print(content)
            else:
              err = data.get('error', {}).get('message', json.dumps(data)[:300])
              print(f'API returned no content: {err}')
          except Exception as e:
            print(f'Parse error: {e}')
          ")

          # Post comment
          gh pr comment "$PR_NUMBER" --body "## AI Code Review (Llama 3.3 70B via Groq)

          ${REVIEW}

          ---
          *Cost: \$0.00 — free model via Groq*"
